# DigitalOcean App Platform spec.
#
# Both Postgres and Redis are hosted EXTERNALLY (free-tier friendly):
#   - DATABASE_URL → Neon (https://neon.tech, Singapore region, Postgres 16).
#     DO's inline dev Postgres doesn't grant CREATE on the public schema under
#     PG16's new defaults, so prisma db push failed. Neon gives us real DB
#     ownership and costs nothing on the free plan.
#   - REDIS_URL → Upstash (https://upstash.com, Singapore, rediss:// TLS URL).
#
# Env-var architecture:
#   - All SECRETs and cross-component shared values live at the top-level
#     `envs:` block below. Components inherit from there automatically.
#   - Do NOT re-declare these keys per component (DO treats a per-component
#     `type: SECRET` without a value as an empty override that shadows the
#     app-level value — that's how the Neon URL ended up resolving empty).
#   - Per-component `envs:` only hold values that are actually unique to that
#     component (e.g. `PORT` on backend).
#
# Before deploying:
#   - After first deploy, in DO panel → App → Settings → Domains, add
#     `api.passtrack.xyz` as a custom domain.
#   - Fill these 8 SECRETs via DO panel → App-Level Env Vars (Encrypt checked):
#       DATABASE_URL, REDIS_URL, JWT_SECRET, SPACES_BUCKET, SPACES_KEY,
#       SPACES_SECRET, RESEND_API_KEY, GOOGLE_CLIENT_SECRET
#   - Confirm the Spaces bucket (passtrack-assets) has CORS rules for
#     https://passtrack.xyz, https://www.passtrack.xyz, http://localhost:3000

name: festify
region: sgp

# ─────────────────────────────────────────────────────────────────────────────
# App-level envs — inherited by every service, worker, and job.
# SECRETs declared here are empty placeholders until filled in the DO panel.
# ─────────────────────────────────────────────────────────────────────────────
envs:
  # External datastores (both set via DO panel → App-Level Env Vars)
  - { key: DATABASE_URL, type: SECRET }
  - { key: REDIS_URL, type: SECRET }

  # Auth
  - { key: JWT_SECRET, type: SECRET }

  # Spaces (object storage) — region/endpoint are non-secret, keys are SECRET
  - { key: SPACES_BUCKET, type: SECRET }
  - { key: SPACES_KEY, type: SECRET }
  - { key: SPACES_SECRET, type: SECRET }

  # Email (Resend via send.passtrack.xyz — DKIM/SPF already verified)
  - { key: APP_NAME, value: Passtrack }
  - { key: EMAIL_PROVIDER, value: resend }
  - { key: EMAIL_FROM, value: "no-reply@send.passtrack.xyz" }
  - { key: EMAIL_FROM_NAME, value: Passtrack }
  - { key: RESEND_API_KEY, type: SECRET }

  # Google OAuth
  - { key: GOOGLE_CLIENT_ID, value: "577415178954-hb4i21df2huk7233e7o06hhhs7p01uja.apps.googleusercontent.com" }
  - { key: GOOGLE_CLIENT_SECRET, type: SECRET }

services:
  - name: backend
    github:
      repo: VishalPachpor/Festify_Affiliate_system
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: npm ci && npm run build
    run_command: npm start
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3001
    health_check:
      http_path: /health
    envs:
      - { key: NODE_ENV, value: production }
      - { key: PORT, value: "3001" }

      # Public URLs — PUBLIC_API_URL is used when generating absolute viewUrl /
      # downloadUrl responses, so it must match the domain the frontend calls.
      - { key: PUBLIC_API_URL, value: "https://api.passtrack.xyz" }
      - { key: APP_URL, value: "https://passtrack.xyz" }
      - { key: FRONTEND_APP_URL, value: "https://passtrack.xyz" }
      - { key: CORS_ORIGIN, value: "https://passtrack.xyz,https://www.passtrack.xyz" }
      - { key: REFERRAL_LINK_BASE, value: "https://event.festify.io" }

      # Spaces non-secret config (keys are app-level SECRETs)
      - { key: SPACES_REGION, value: sgp1 }
      - { key: SPACES_ENDPOINT, value: https://sgp1.digitaloceanspaces.com }

workers:
  - name: event-worker
    github:
      repo: VishalPachpor/Festify_Affiliate_system
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: npm ci && npm run build
    run_command: node dist/workers/event-worker.js
    instance_size_slug: basic-xxs
    envs:
      - { key: NODE_ENV, value: production }

  - name: inbound-processor
    github:
      repo: VishalPachpor/Festify_Affiliate_system
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: npm ci && npm run build
    run_command: node dist/processors/worker.js
    instance_size_slug: basic-xxs
    envs:
      - { key: NODE_ENV, value: production }

jobs:
  # Runs once per deploy, before the services start — applies prisma schema
  # changes to the external Neon Postgres. Seed is NOT run here; invoke
  # `npm run db:seed` manually when you need fixtures.
  #
  # No `envs:` block — DATABASE_URL is inherited from the app-level envs above.
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: VishalPachpor/Festify_Affiliate_system
      branch: main
    source_dir: backend
    build_command: npm ci && npm run build
    run_command: npm run deploy:migrate
    instance_size_slug: basic-xxs
