# DigitalOcean App Platform spec.
#
# External datastores (both free-tier for the demo):
#   - DATABASE_URL → Neon (https://neon.tech, Singapore, Postgres 16). DO's
#     inline dev PG doesn't grant CREATE on public under PG16's new defaults,
#     so Neon is the right call.
#   - REDIS_URL → Upstash (https://upstash.com, Singapore, rediss:// TLS).
#
# IMPORTANT — env var architecture:
# DO App Platform does NOT inherit app-level env vars to components. Every
# env a component needs has to be declared on that component. App-level envs
# in the UI get copied into component placeholders at Save time, but any
# `doctl apps update --spec` wipes those copies. So to keep the spec and the
# runtime behaviour in sync, we declare the full set of envs per component
# and rely on per-component UI fills for SECRETs.
#
# Before deploying:
#   - Fill SECRETs via DO panel → App → Components → [component] →
#     Environment Variables (Encrypt enabled). The full matrix:
#
#     backend:            DATABASE_URL, REDIS_URL, JWT_SECRET, SPACES_BUCKET,
#                         SPACES_KEY, SPACES_SECRET, RESEND_API_KEY,
#                         GOOGLE_CLIENT_SECRET, BOLDSIGN_API_KEY,
#                         BOLDSIGN_MOU_TEMPLATE_ID, BOLDSIGN_WEBHOOK_SECRET,
#                         LUMA_API_KEY
#     event-worker:       DATABASE_URL, REDIS_URL, RESEND_API_KEY
#     inbound-processor:  DATABASE_URL, REDIS_URL
#     migrate (job):      DATABASE_URL
#
#   - Spaces bucket (passtrack-assets) CORS is one-time manual setup — either
#     via DO dashboard (Spaces → passtrack-assets → Settings → CORS) or via
#     `npm run spaces:cors` with a Full Access Spaces key. Needs POST from
#     https://passtrack.xyz, https://www.passtrack.xyz, http://localhost:3000.
#   - After first green deploy, add `api.passtrack.xyz` in DO → Settings →
#     Domains and paste the CNAME into your DNS provider.
#   - After `prisma db push` adds the MouAgreement table, run
#     `npm run db:migrate-mou-current-unique` once against Neon to add the
#     partial unique index that Prisma can't express in schema.prisma.

name: festify
region: sgp

services:
  - name: backend
    github:
      repo: VishalPachpor/Festify_Affiliate_system
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: npm ci && npm run build
    run_command: npm start
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3001
    health_check:
      http_path: /health
    envs:
      # Core
      - { key: NODE_ENV, value: production }
      - { key: PORT, value: "3001" }
      - { key: APP_NAME, value: Passtrack }

      # External datastores (secrets)
      - { key: DATABASE_URL, type: SECRET }
      - { key: REDIS_URL, type: SECRET }

      # Auth
      - { key: JWT_SECRET, type: SECRET }

      # Public URLs
      - { key: PUBLIC_API_URL, value: "https://api.passtrack.xyz" }
      - { key: APP_URL, value: "https://passtrack.xyz" }
      - { key: FRONTEND_APP_URL, value: "https://passtrack.xyz" }
      - { key: CORS_ORIGIN, value: "https://passtrack.xyz,https://www.passtrack.xyz" }
      - { key: REFERRAL_LINK_BASE, value: "https://event.festify.io" }

      # Spaces (object storage)
      - { key: SPACES_REGION, value: sgp1 }
      - { key: SPACES_ENDPOINT, value: https://sgp1.digitaloceanspaces.com }
      - { key: SPACES_BUCKET, type: SECRET }
      - { key: SPACES_KEY, type: SECRET }
      - { key: SPACES_SECRET, type: SECRET }

      # Email — Resend.
      # The verified domain in Resend is `passtrack.xyz` (apex). Resend strictly
      # checks the From-header domain matches a verified entry — sending from
      # `@send.passtrack.xyz` returned 403 "domain is not verified" even though
      # the apex was verified, because Resend does not auto-allow subdomains.
      # If you want to send from `@send.passtrack.xyz` instead, add and verify
      # that subdomain separately in Resend → Domains.
      - { key: EMAIL_PROVIDER, value: resend }
      - { key: EMAIL_FROM, value: "no-reply@passtrack.xyz" }
      - { key: EMAIL_FROM_NAME, value: Passtrack }
      - { key: RESEND_API_KEY, type: SECRET }

      # Google OAuth
      - { key: GOOGLE_CLIENT_ID, value: "577415178954-hb4i21df2huk7233e7o06hhhs7p01uja.apps.googleusercontent.com" }
      - { key: GOOGLE_CLIENT_SECRET, type: SECRET }

      # BoldSign — affiliate MOU signing.
      # DISABLE_EMAILS=true so BoldSign does NOT send its own signing email;
      # the dashboard email from sendAffiliateMouEmail is the only one the
      # affiliate sees, pointing at /dashboard/application/mou. Flipping this
      # to false would result in two emails with two different signing URLs.
      - { key: BOLDSIGN_BASE_URL, value: "https://api.boldsign.com" }
      - { key: BOLDSIGN_DISABLE_EMAILS, value: "true" }
      - { key: BOLDSIGN_API_KEY, type: SECRET }
      - { key: BOLDSIGN_MOU_TEMPLATE_ID, type: SECRET }
      - { key: BOLDSIGN_WEBHOOK_SECRET, type: SECRET }

      # Luma — outbound API for auto-creating affiliate coupons after MOU
      # activation. Calendar-scoped key (Luma Plus required). Without this
      # set, syncCouponToLuma silently skips and codes stay unverified.
      # Per-campaign Luma event mapping lives in Campaign.lumaEventId.
      - { key: LUMA_API_KEY, type: SECRET }

workers:
  - name: event-worker
    github:
      repo: VishalPachpor/Festify_Affiliate_system
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: npm ci && npm run build
    run_command: node dist/workers/event-worker.js
    instance_size_slug: basic-xxs
    envs:
      - { key: NODE_ENV, value: production }
      - { key: DATABASE_URL, type: SECRET }
      - { key: REDIS_URL, type: SECRET }
      # Affiliate welcome emails go through Resend from this worker.
      # Match backend: From must use the verified apex `passtrack.xyz`.
      - { key: APP_NAME, value: Passtrack }
      - { key: EMAIL_PROVIDER, value: resend }
      - { key: EMAIL_FROM, value: "no-reply@passtrack.xyz" }
      - { key: EMAIL_FROM_NAME, value: Passtrack }
      - { key: RESEND_API_KEY, type: SECRET }

  - name: inbound-processor
    github:
      repo: VishalPachpor/Festify_Affiliate_system
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: npm ci && npm run build
    run_command: node dist/processors/worker.js
    instance_size_slug: basic-xxs
    envs:
      - { key: NODE_ENV, value: production }
      - { key: DATABASE_URL, type: SECRET }
      - { key: REDIS_URL, type: SECRET }

jobs:
  # Runs once per deploy, before services start — `prisma db push` against
  # Neon. Demo fixtures (seed, admin bootstrap, sales/payouts) and
  # infrastructure setup (Spaces bucket CORS) are NOT run here; they are
  # one-time bootstrap tasks invoked manually against production:
  #
  #   npm run db:seed               — demo tenant, campaign, milestones, assets
  #   npm run db:bootstrap-admin    — just the admin@festify.io row
  #   npm run db:seed-sales-payouts — a few sales + pending payouts for QA
  #
  # Bucket CORS was attempted in a deploy chain earlier but failed with 403
  # AccessDenied — the standard Spaces access key only grants object-level
  # read/write. PutBucketCors requires a Full Access scoped key (generate
  # one-off from DO Account → API → Spaces keys, run `npm run spaces:cors`
  # locally, revoke the key). Easier path: configure via DO Spaces dashboard
  # UI directly (Spaces Object Storage → passtrack-assets → Settings → CORS
  # Configurations). Both end-states are identical.
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: VishalPachpor/Festify_Affiliate_system
      branch: main
    source_dir: backend
    build_command: npm ci && npm run build
    run_command: npm run deploy:migrate
    instance_size_slug: basic-xxs
    envs:
      - { key: DATABASE_URL, type: SECRET }
