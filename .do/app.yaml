# DigitalOcean App Platform spec.
#
# External datastores (both free-tier for the demo):
#   - DATABASE_URL → Neon (https://neon.tech, Singapore, Postgres 16). DO's
#     inline dev PG doesn't grant CREATE on public under PG16's new defaults,
#     so Neon is the right call.
#   - REDIS_URL → Upstash (https://upstash.com, Singapore, rediss:// TLS).
#
# IMPORTANT — env var architecture:
# DO App Platform does NOT inherit app-level env vars to components. Every
# env a component needs has to be declared on that component. App-level envs
# in the UI get copied into component placeholders at Save time, but any
# `doctl apps update --spec` wipes those copies. So to keep the spec and the
# runtime behaviour in sync, we declare the full set of envs per component
# and rely on per-component UI fills for SECRETs.
#
# Before deploying:
#   - Fill SECRETs via DO panel → App → Components → [component] →
#     Environment Variables (Encrypt enabled). The full matrix:
#
#     backend:            DATABASE_URL, REDIS_URL, JWT_SECRET, SPACES_BUCKET,
#                         SPACES_KEY, SPACES_SECRET, RESEND_API_KEY,
#                         GOOGLE_CLIENT_SECRET
#     event-worker:       DATABASE_URL, REDIS_URL, RESEND_API_KEY
#     inbound-processor:  DATABASE_URL, REDIS_URL
#     migrate (job):      DATABASE_URL
#
#   - Spaces bucket (passtrack-assets) CORS must allow https://passtrack.xyz,
#     https://www.passtrack.xyz, http://localhost:3000. Apply with:
#       cd backend && SPACES_KEY=… SPACES_SECRET=… SPACES_BUCKET=passtrack-assets \
#         CORS_ORIGIN="https://passtrack.xyz,https://www.passtrack.xyz" \
#         npm run spaces:cors
#     (source: backend/scripts/configure-spaces-cors.ts — idempotent, POST-only)
#   - After first green deploy, add `api.passtrack.xyz` in DO → Settings →
#     Domains and paste the CNAME into your DNS provider.

name: festify
region: sgp

services:
  - name: backend
    github:
      repo: VishalPachpor/Festify_Affiliate_system
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: npm ci && npm run build
    run_command: npm start
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3001
    health_check:
      http_path: /health
    envs:
      # Core
      - { key: NODE_ENV, value: production }
      - { key: PORT, value: "3001" }
      - { key: APP_NAME, value: Passtrack }

      # External datastores (secrets)
      - { key: DATABASE_URL, type: SECRET }
      - { key: REDIS_URL, type: SECRET }

      # Auth
      - { key: JWT_SECRET, type: SECRET }

      # Public URLs
      - { key: PUBLIC_API_URL, value: "https://api.passtrack.xyz" }
      - { key: APP_URL, value: "https://passtrack.xyz" }
      - { key: FRONTEND_APP_URL, value: "https://passtrack.xyz" }
      - { key: CORS_ORIGIN, value: "https://passtrack.xyz,https://www.passtrack.xyz" }
      - { key: REFERRAL_LINK_BASE, value: "https://event.festify.io" }

      # Spaces (object storage)
      - { key: SPACES_REGION, value: sgp1 }
      - { key: SPACES_ENDPOINT, value: https://sgp1.digitaloceanspaces.com }
      - { key: SPACES_BUCKET, type: SECRET }
      - { key: SPACES_KEY, type: SECRET }
      - { key: SPACES_SECRET, type: SECRET }

      # Email (Resend via send.passtrack.xyz)
      - { key: EMAIL_PROVIDER, value: resend }
      - { key: EMAIL_FROM, value: "no-reply@send.passtrack.xyz" }
      - { key: EMAIL_FROM_NAME, value: Passtrack }
      - { key: RESEND_API_KEY, type: SECRET }

      # Google OAuth
      - { key: GOOGLE_CLIENT_ID, value: "577415178954-hb4i21df2huk7233e7o06hhhs7p01uja.apps.googleusercontent.com" }
      - { key: GOOGLE_CLIENT_SECRET, type: SECRET }

workers:
  - name: event-worker
    github:
      repo: VishalPachpor/Festify_Affiliate_system
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: npm ci && npm run build
    run_command: node dist/workers/event-worker.js
    instance_size_slug: basic-xxs
    envs:
      - { key: NODE_ENV, value: production }
      - { key: DATABASE_URL, type: SECRET }
      - { key: REDIS_URL, type: SECRET }
      # Affiliate welcome emails go through Resend from this worker.
      - { key: APP_NAME, value: Passtrack }
      - { key: EMAIL_PROVIDER, value: resend }
      - { key: EMAIL_FROM, value: "no-reply@send.passtrack.xyz" }
      - { key: EMAIL_FROM_NAME, value: Passtrack }
      - { key: RESEND_API_KEY, type: SECRET }

  - name: inbound-processor
    github:
      repo: VishalPachpor/Festify_Affiliate_system
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: npm ci && npm run build
    run_command: node dist/processors/worker.js
    instance_size_slug: basic-xxs
    envs:
      - { key: NODE_ENV, value: production }
      - { key: DATABASE_URL, type: SECRET }
      - { key: REDIS_URL, type: SECRET }

jobs:
  # Runs once per deploy, before services start — `prisma db push` against
  # Neon. Seed is NOT run here; invoke `npm run db:seed` manually for fixtures.
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: VishalPachpor/Festify_Affiliate_system
      branch: main
    source_dir: backend
    build_command: npm ci && npm run build
    run_command: npm run deploy:migrate
    instance_size_slug: basic-xxs
    envs:
      - { key: DATABASE_URL, type: SECRET }
